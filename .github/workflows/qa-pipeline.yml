name: QA Pipeline

# ▶ GATILHO — "Toda vez que alguém abre um PR para o main, isso aqui roda sozinho"
on:
  pull_request:
    branches: [main]

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # QUALITY GATE 1 — Testes Unitários
  # "Valida a lógica do código. Roda em segundos."
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  unit-tests:
    name: "1 · Testes Unitários (Jest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-finder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-finder/package-lock.json

      - name: Instalar dependências
        run: npm ci

      # ▶ "Se qualquer unitário falhar, o pipeline para aqui. O E2E nem começa."
      - name: Rodar testes unitários
        run: npm test -- --watchAll=false --passWithNoTests

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # QUALITY GATE 2 — Testes E2E
  # "Simula o usuário real no navegador. Só roda se os unitários passaram."
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  e2e-tests:
    name: "2 · Testes E2E (Robot Framework)"
    runs-on: ubuntu-latest
    needs: unit-tests  # ◀ "Esse é o encadeamento — Gate 1 antes do Gate 2"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-finder/package-lock.json

      - name: Instalar dependências do agent-finder
        working-directory: agent-finder
        run: npm ci

      # ▶ "O CI sobe o próprio frontend para testar — ambiente isolado, sem depender de ninguém"
      - name: Subir agent-finder em background
        working-directory: agent-finder
        run: |
          BROWSER=none npm start &
          echo "Aguardando agent-finder na porta 3000..."
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          CI: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "simple-project-robot 4/requirements.txt"

      - name: Instalar Robot Framework
        working-directory: "simple-project-robot 4"
        run: pip install -r requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      # ▶ "Roda os cenários Gherkin — os mesmos que o QA escreveu, sem intervenção manual"
      - name: Rodar testes E2E
        working-directory: "simple-project-robot 4"
        run: |
          robot \
            --variable BROWSER:headlesschrome \
            --outputdir results \
            tests/features/agent_finder.robot

      # ▶ "Relatório HTML disponível para download — o QA pode ver exatamente o que falhou e onde"
      - name: Publicar relatório Robot como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: "simple-project-robot 4/results/"
          retention-days: 7

      - name: Reset — limpar resultados para próxima execução
        if: always()
        working-directory: "simple-project-robot 4"
        run: rm -rf results/
