name: QA Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: "Testes Unitários (Jest)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-finder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-finder/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes unitários
        run: npm test -- --watchAll=false --passWithNoTests

  e2e-tests:
    name: "Testes E2E (Robot Framework)"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agent-finder/package-lock.json

      - name: Instalar dependências do agent-finder
        working-directory: agent-finder
        run: npm ci

      - name: Subir agent-finder em background
        working-directory: agent-finder
        run: |
          BROWSER=none npm start &
          echo "Aguardando agent-finder na porta 3000..."
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          CI: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: "simple-project-robot 4/requirements.txt"

      - name: Instalar Robot Framework
        working-directory: "simple-project-robot 4"
        run: pip install -r requirements.txt

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Rodar testes E2E
        working-directory: "simple-project-robot 4"
        run: |
          robot \
            --variable BROWSER:headlesschrome \
            --outputdir results \
            tests/features/agent_finder.robot
        env:
          DISPLAY: :99

      - name: Publicar relatório Robot como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report
          path: "simple-project-robot 4/results/"
          retention-days: 7

      - name: Reset — limpar resultados para próxima demo
        if: always()
        working-directory: "simple-project-robot 4"
        run: rm -rf results/
